<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Calculator Using HTML, CSS, JavaScript</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <marquee class="marquee" style="background-color: rgb(243, 103, 4);">Neeraj Kumar</marquee>
    <marquee class="marquee" style="background-color: rgb(255, 255, 255);color: blue;">Neeraj Kumar</marquee>
    <marquee class="marquee" style="background-color: rgb(12, 230, 22);">Neeraj Kumar</marquee>
    <div class="outer-container">
        <h1 class="heading"> Basic Calculator</h1>
        <div class="calculator-part">
            <div class="display-section">
                <input type="text" class="input" id="input" placeholder="Calculate Number ">
            </div>
            <div class="button-section">
                <button class="btn fun-btn">AC</button>
                <button class="btn fun-btn" id="toggle">()</button>
                <button class="btn fun-btn">%</button>
                <button class="btn fun-btn">/</button><br>
                <button class="btn">7</button>
                <button class="btn">8</button>
                <button class="btn">9</button>
                <button class="btn fun-btn">*</button><br>
                <button class="btn">4</button>
                <button class="btn">5</button>
                <button class="btn">6</button>
                <button class="btn fun-btn">-</button><br>
                <button class="btn">1</button>
                <button class="btn">2</button>
                <button class="btn">3</button>
                <button class="btn fun-btn">+</button><br>
                <button class="btn">0</button>
                <button class="btn">.</button>
                <button class="btn">C</button>
                <button class="btn" id="equle">=</button>
            </div>
        </div>
    </div>
<script src="script.js"></script>
</body>
</html>
